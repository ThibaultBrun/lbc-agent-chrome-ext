<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>LBC Bike Analyzer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="logo">L</div>
      <h1>LBC Analyzer</h1>
    </header>
    <main>
      <p id="status" class="muted">Détection en cours…</p>
      <div id="actions" class="hidden">
        <button id="btn-analyze" class="primary">Analyser cette annonce</button>
      </div>
      <button id="btn-options">Options</button>
      <div id="diag">
        <h3>Diagnostic</h3>
        <ul>
          <li>Backend : <span id="diag-backend">…</span></li>
          <li>Ollama : <span id="diag-ollama">…</span></li>
          <li>Modèles : <span id="diag-models">—</span></li>
        </ul>
      </div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
